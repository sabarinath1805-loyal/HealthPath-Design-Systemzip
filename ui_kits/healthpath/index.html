<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<!-- Compiled design-system bundle (window.HealthPathDesignSystem_54b6fa) -->
<script src="../../_ds_bundle.js"></script>

<style>
  html, body { margin:0; height:100%; background: var(--background); }
  body { font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }

  /* ---- Showcase chrome (the screen switcher around the app) ---- */
  .showcase { display:flex; flex-direction:column; height:100vh; background: var(--warm-150); }
  .showcase__bar {
    display:flex; align-items:center; gap: var(--space-3);
    padding: 10px 16px;
    background: var(--surface-card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .showcase__sep {
    width: 1px; height: 20px; background: var(--border); margin: 0 4px;
  }
  .showcase__tab {
    font: var(--type-ui); font-size: 13px;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    cursor: pointer;
    transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
  }
  .showcase__tab:hover { background: var(--surface-hover); color: var(--text-primary); }
  .showcase__tab.is-active {
    background: var(--brand-subtle);
    color: var(--brand-subtle-text);
  }
  .showcase__meta { font: var(--type-caption); color: var(--text-muted); }

  .showcase__stage {
    flex: 1; min-height: 0;
    background: var(--warm-150);
    display: flex; align-items: stretch; justify-content: center;
    padding: 0;
    overflow: hidden;
  }
  /* Desktop screens fill the stage entirely */
  .showcase__stage > * { flex: 1; min-width: 0; }

  /* Phone frame for mobile previews */
  .hp-mobile-frame {
    width: 390px;
    height: min(100%, 780px);
    margin: 24px auto;
    background: var(--background);
    border-radius: 38px;
    border: 10px solid var(--warm-900);
    overflow: hidden;
    position: relative;
    box-shadow: var(--shadow-modal);
    flex: 0 0 auto !important;
  }
  .hp-mobile-frame .hp-app { position: relative; height: 100%; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react" src="./screens.jsx"></script>
</body>
</html>
