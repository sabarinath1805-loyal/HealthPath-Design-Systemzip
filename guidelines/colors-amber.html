<!-- @dsCard group="Colors" viewport="700x150" name="Escalation amber" subtitle="The Escalation card only. Warm guide, not a warning siren." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px; background:var(--background); font-family:var(--font-sans); color:var(--text-primary); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; min-width:0; border-radius:var(--radius-sm); padding:10px 12px; display:flex; flex-direction:column; gap:2px; border:1px solid var(--border-subtle); }
  .name { font:var(--type-ui); font-size:11.5px; }
  .hex  { font:var(--type-mono); font-size:10.5px; opacity:.7; }
  .light { color: var(--warm-900); }
  .dark  { color: var(--warm-50); }
</style></head><body>
<div class="row">
  <div class="sw light" style="background:var(--amber-50)"><span class="name">amber-50</span><span class="hex">escalation bg</span></div>
  <div class="sw light" style="background:var(--amber-100)"><span class="name">amber-100</span><span class="hex">tint</span></div>
  <div class="sw light" style="background:var(--amber-200)"><span class="name">amber-200</span><span class="hex">tint</span></div>
  <div class="sw light" style="background:var(--amber-300)"><span class="name">amber-300</span><span class="hex">tint</span></div>
  <div class="sw light" style="background:var(--amber-400)"><span class="name">amber-400</span><span class="hex"></span></div>
  <div class="sw light" style="background:var(--amber-500)"><span class="name">amber-500</span><span class="hex">accent border</span></div>
  <div class="sw dark"  style="background:var(--amber-600)"><span class="name">amber-600</span><span class="hex">icon</span></div>
  <div class="sw dark"  style="background:var(--amber-700)"><span class="name">amber-700</span><span class="hex">text</span></div>
</div>
</body></html>
