<!-- @dsCard group="Spacing" viewport="700x140" name="Motion & easing" subtitle="Calm, never bouncy. Gentle settle on entrance." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px 22px; background:var(--background); color:var(--text-primary); font-family:var(--font-sans); }
  .row { display:flex; gap:24px; align-items:center; flex-wrap:wrap; }
  .demo { display:flex; flex-direction:column; gap:6px; }
  .dot { width:14px; height:14px; border-radius:var(--radius-full); background:var(--teal-600); animation: slide 2.6s var(--ease-out) infinite alternate; }
  .dot.smooth { animation-timing-function: var(--ease-smooth); background: var(--blue-500); }
  .dot.inout { animation-timing-function: var(--ease-in-out); background: var(--amber-500); }
  @keyframes slide { from { transform: translateX(0) } to { transform: translateX(180px) } }
  .lbl { font:var(--type-caption); color:var(--text-muted); font-family:var(--font-mono); }
  .name { font:var(--type-ui); font-size:11.5px; }
  .meta { font:var(--type-caption); color:var(--text-muted); }
</style></head><body>
<div class="row">
  <div class="demo"><div class="dot"></div><div class="name">--ease-out</div><div class="lbl">0.22,1,0.36,1 · default</div></div>
  <div class="demo"><div class="dot smooth"></div><div class="name">--ease-smooth</div><div class="lbl">0.4,0,0.2,1</div></div>
  <div class="demo"><div class="dot inout"></div><div class="name">--ease-in-out</div><div class="lbl">0.45,0,0.55,1</div></div>
  <div class="meta" style="margin-left:auto">durations · 120 · 200 · 280ms</div>
</div>
</body></html>
