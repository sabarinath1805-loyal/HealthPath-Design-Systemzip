<!-- @dsCard group="Colors" viewport="700x180" name="Semantic surfaces & text" subtitle="The aliases components actually reference." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px; background:var(--background); font-family:var(--font-sans); color:var(--text-primary); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .tile { border:1px solid var(--border-subtle); border-radius:var(--radius-sm); padding:12px; display:flex; flex-direction:column; gap:4px; min-height:64px; justify-content:space-between; }
  .label { font:var(--type-ui); font-size:11.5px; }
  .meta  { font:var(--type-mono); font-size:10.5px; opacity:.7; }
</style></head><body>
<div class="grid">
  <div class="tile" style="background:var(--background)"><span class="label">--background</span><span class="meta">canvas</span></div>
  <div class="tile" style="background:var(--surface-card); box-shadow:var(--shadow-card)"><span class="label">--surface-card</span><span class="meta">raised card</span></div>
  <div class="tile" style="background:var(--surface-sunken)"><span class="label">--surface-sunken</span><span class="meta">sidebar / well</span></div>
  <div class="tile" style="background:var(--surface-hover)"><span class="label">--surface-hover</span><span class="meta">hover</span></div>
  <div class="tile" style="background:var(--surface-card); color:var(--text-primary)"><span class="label">--text-primary</span><span class="meta">warm-900</span></div>
  <div class="tile" style="background:var(--surface-card); color:var(--text-secondary)"><span class="label">--text-secondary</span><span class="meta">warm-700</span></div>
  <div class="tile" style="background:var(--surface-card); color:var(--text-muted)"><span class="label">--text-muted</span><span class="meta">warm-500 · disclaimer</span></div>
  <div class="tile" style="background:var(--surface-card); color:var(--text-link)"><span class="label">--text-link</span><span class="meta">blue-600</span></div>
</div>
</body></html>
