<!-- @dsCard group="Brand" viewport="700x200" name="Voice in action" subtitle="What HealthPath sounds like in a real reply." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--background); color:var(--text-primary); font-family:var(--font-sans); }
  .line { font:var(--type-chat); max-width: 58ch; }
  .line + .line { margin-top:8px; }
  .lbl { font:var(--type-caption); color:var(--text-muted); font-family:var(--font-mono); display:block; margin-bottom:6px; }
  .ex { padding:10px 12px; border-left:2px solid var(--border-strong); margin-bottom:14px; }
  .ex.good { border-left-color: var(--teal-600); background: var(--teal-50); }
  .ex.bad  { border-left-color: var(--red-400); background: var(--red-50); }
  .tag { font:var(--type-caption); font-weight:var(--weight-semibold); letter-spacing:var(--tracking-wide); text-transform:uppercase; }
  .good .tag { color: var(--teal-700); }
  .bad .tag { color: var(--red-600); }
</style></head><body>
<div class="ex good">
  <span class="tag">Good</span>
  <div class="line">This part is confusing on purpose. I can draft a written request that asks for an answer in 10 working days. You don't need any special words for it.</div>
</div>
<div class="ex bad">
  <span class="tag">Avoid</span>
  <div class="line">Hey there! 👋 No worries — let's get you sorted on your healthcare journey! ✨</div>
</div>
</body></html>
