<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px 22px; background:var(--background); color:var(--text-primary); font-family:var(--font-sans); }
  .row { display:flex; align-items:end; gap:14px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background:var(--teal-600); border-radius:2px; }
  .lbl { font:var(--type-caption); color:var(--text-muted); font-family:var(--font-mono); }
  .name { font:var(--type-ui); font-size:11.5px; }
</style></head><body>
<div class="row">
  <div class="col"><div class="bar" style="width:18px;height:4px"></div><div class="name">1</div><div class="lbl">4</div></div>
  <div class="col"><div class="bar" style="width:18px;height:8px"></div><div class="name">2</div><div class="lbl">8</div></div>
  <div class="col"><div class="bar" style="width:18px;height:12px"></div><div class="name">3</div><div class="lbl">12</div></div>
  <div class="col"><div class="bar" style="width:18px;height:16px"></div><div class="name">4</div><div class="lbl">16</div></div>
  <div class="col"><div class="bar" style="width:18px;height:20px"></div><div class="name">5</div><div class="lbl">20</div></div>
  <div class="col"><div class="bar" style="width:18px;height:24px"></div><div class="name">6</div><div class="lbl">24</div></div>
  <div class="col"><div class="bar" style="width:18px;height:32px"></div><div class="name">8</div><div class="lbl">32</div></div>
  <div class="col"><div class="bar" style="width:18px;height:40px"></div><div class="name">10</div><div class="lbl">40</div></div>
  <div class="col"><div class="bar" style="width:18px;height:48px"></div><div class="name">12</div><div class="lbl">48</div></div>
  <div class="col"><div class="bar" style="width:18px;height:64px"></div><div class="name">16</div><div class="lbl">64</div></div>
</div>
</body></html>
