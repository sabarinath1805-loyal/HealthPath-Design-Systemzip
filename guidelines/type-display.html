<!-- @dsCard group="Type" viewport="700x150" name="Display & headings" subtitle="Geist semibold, -0.025em tracking. Sentence case." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px 22px; background:var(--background); color:var(--text-primary); font-family:var(--font-sans); }
  .stack > * + * { margin-top:8px; }
  .hero { font:var(--type-hero); letter-spacing:var(--tracking-tight); }
  .title { font:var(--type-title); letter-spacing:var(--tracking-tight); }
  .head { font:var(--type-head); letter-spacing:var(--tracking-tight); }
  .lbl { font:var(--type-caption); color:var(--text-muted); font-family:var(--font-mono); margin-left:10px; }
</style></head><body>
<div class="stack">
  <div class="hero">Tell me what's going on<span class="lbl">type-hero · 38/1.2</span></div>
  <div class="title">Insurance &amp; coverage<span class="lbl">type-title · 30/1.2</span></div>
  <div class="head">Generated letter<span class="lbl">type-head · 24/1.4</span></div>
</div>
</body></html>
