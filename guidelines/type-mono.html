<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px 22px; background:var(--background); color:var(--text-primary); font-family:var(--font-sans); }
  .row { display:flex; gap:14px; align-items:baseline; flex-wrap:wrap; }
  .chip { font:var(--type-mono); background:var(--warm-100); border:1px solid var(--border); padding:5px 8px; border-radius:var(--radius-xs); }
  .meta { font:var(--type-caption); color:var(--text-muted); }
  .lbl { font:var(--type-caption); color:var(--text-muted); font-family:var(--font-mono); margin-top:8px; display:block; }
</style></head><body>
<div class="row">
  <span class="chip">CASE-2026-04812</span>
  <span class="chip">EPS-CO-99174</span>
  <span class="chip">DOC-Q3-A41</span>
  <span class="meta">tabular figures · ligatures off</span>
</div>
<span class="lbl">type-mono · 13 medium · for reference codes only</span>
</body></html>
