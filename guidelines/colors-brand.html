<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Teal" subtitle="The HealthPath green. Calm, health-adjacent, never clinical." -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:18px; background:var(--background); font-family:var(--font-sans); color:var(--text-primary); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; min-width:0; border-radius:var(--radius-sm); padding:10px 12px; display:flex; flex-direction:column; gap:2px; border:1px solid var(--border-subtle); }
  .name { font:var(--type-ui); font-size:11.5px; opacity:.85; }
  .hex  { font:var(--type-mono); font-size:10.5px; opacity:.65; }
  .ink-light { color: var(--warm-900); }
  .ink-dark  { color: var(--on-brand); }
</style></head><body>
<div class="row">
  <div class="sw ink-light" style="background:var(--teal-50)"><span class="name">teal-50</span><span class="hex">brand subtle bg</span></div>
  <div class="sw ink-light" style="background:var(--teal-100)"><span class="name">teal-100</span><span class="hex">tint</span></div>
  <div class="sw ink-light" style="background:var(--teal-200)"><span class="name">teal-200</span><span class="hex">tint</span></div>
  <div class="sw ink-light" style="background:var(--teal-300)"><span class="name">teal-300</span><span class="hex">tint</span></div>
  <div class="sw ink-dark"  style="background:var(--teal-500)"><span class="name">teal-500</span><span class="hex">hover</span></div>
  <div class="sw ink-dark"  style="background:var(--teal-600)"><span class="name">teal-600</span><span class="hex">primary · brand</span></div>
  <div class="sw ink-dark"  style="background:var(--teal-700)"><span class="name">teal-700</span><span class="hex">hover</span></div>
  <div class="sw ink-dark"  style="background:var(--teal-800)"><span class="name">teal-800</span><span class="hex">active</span></div>
  <div class="sw ink-dark"  style="background:var(--teal-900)"><span class="name">teal-900</span><span class="hex">on-light text</span></div>
</div>
</body></html>
