<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; padding:20px 22px; background:var(--background); font-family:var(--font-sans); color:var(--text-primary); }
  .stack > * + * { margin-top: 18px; }
</style>
</head><body>
<div id="root" class="hp stack"></div>
<script type="text/babel">
  const NS = window.HealthPathDesignSystem_54b6fa;
  const { UserBubble, AssistantMessage, AssistantText, DocumentCard, EscalationCard } = NS;
  const letter = "Estimado/a Director/a:\n\nLe escribo para solicitar formalmente la entrega del medicamento Atorvastatina 40 mg, prescrito por mi médico tratante el 4 de junio de 2026, que mi EPS ha negado sin justificación escrita.\n\nConforme al artículo 10 de la Resolución 1604 de 2013, solicito respuesta escrita en un plazo de diez (10) días hábiles.";
  function Demo() {
    return (
      <div>
        <UserBubble>Mi EPS me negó la atorvastatina. ¿Qué hago?</UserBubble>
        <AssistantMessage>
          <AssistantText>Lamento que estés pasando por esto. Lo primero es pedir la negación por escrito — tu EPS está obligada a entregártela. Después presentamos una solicitud formal.</AssistantText>
        </AssistantMessage>
        <AssistantMessage>
          <AssistantText>Aquí tienes el borrador. Puedes copiarlo tal cual o cambiar lo que quieras antes de enviar.</AssistantText>
          <DocumentCard
            title="Solicitud formal de medicamento"
            caseId="CASE-2026-04812"
            language="Spanish · formal"
            preview={letter} />
        </AssistantMessage>
        <AssistantMessage>
          <EscalationCard
            label="Next step"
            title="Tu caso lleva 18 días abierto sin respuesta."
            description="La EPS tiene 10 días hábiles para responder por escrito. Es momento de pedir una respuesta formal."
            icon="clock"
            primaryAction={{ label: "Redactar recordatorio" }}
            secondaryAction={{ label: "¿A quién llamo?" }} />
        </AssistantMessage>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body></html>
